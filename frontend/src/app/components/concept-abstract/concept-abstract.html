<h1>{{concept().title}}</h1>
<p>{{concept().description}}</p>
<h2>Relations →</h2>
@for(relation of concept().relations.to; track relation.relation.id.id) {
  <h3>{{relation.relation.title}}</h3>
  <ul>
    @for(target of relation.objects; track target.id.id) {
      <li><a href="concept/{{target.id.type}}/{{target.id.id}}">{{target.title}}</a></li>
    }
  </ul>
}
