<div id="concept-menu" class="btn-group-vertical">
  @for (item of items(); track item.id) {
    <button
      type="button"
      class="btn btn-primary"
      [class.active]="isSelected(item.id)"
      [disabled]="item.disabled"
      (click)="select(item)"
    >
      <span class="menu-label">
      @if (item.icon) {
        <i class="{{ item.icon }} me-2"></i>
      }
      {{ item.label }}</span>
    </button>
  }
</div>
