<div id="concept-menu" class="btn-group-vertical">
  @for (item of items(); track item.id) {
    <button
      type="button"
      class="btn btn-primary btn-sm"
      [class.active]="isSelected(item.id)"
      [disabled]="item.disabled"
      (click)="select(item)"
    >
      <span class="menu-label">
      {{ item.label }}</span>
    </button>
  }
</div>
