<div #timeline id="timeline"></div>
@if (inactive()) {
  <h1 class="inactiveHint">inactive_timeline</h1>
} @else {
  <div class="timeline-zoom-buttons btn-group-vertical">
    <button (click)="zoomIn($event)" type="button" class="btn btn-default">+</button>
    <button (click)="zoomOut($event)" type="button" class="btn btn-default">-</button>
  </div>
}
